name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      push_docker:
        description: 'Build and Push Docker Image'
        type: boolean
        default: true
      deploy:
        description: 'Deploy on Remote Server'
        type: boolean
        default: true

env:
  DOCKER_IMAGE: ${{ secrets.DOCKER_USERNAME }}/my-app

jobs:
  # ---------- Tests always run: on push AND before any manual build/deploy ----------
  # Testcontainers (SharedPostgresContainer) starts Postgres automatically on the runner.
  verify:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Verify
        run: mvn -B verify

  # ---------- Build & push image to Docker Hub (manual trigger only) ----------
  build:
    needs: verify
    runs-on: ubuntu-latest
    environment: dev
    if: github.event_name == 'workflow_dispatch' && inputs.push_docker
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Package JAR (tests already passed in verify job)
        run: mvn -B package -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

  # ---------- Deploy to EC2 via docker compose (manual trigger only) ----------
  deploy:
    needs: [verify, build]
    runs-on: ubuntu-latest
    environment: dev
    # always() lets deploy run even when build was skipped (push_docker=false,
    # i.e. redeploying the existing image), but never when verify/build FAILED
    if: >
      always() &&
      github.event_name == 'workflow_dispatch' &&
      inputs.deploy &&
      needs.verify.result == 'success' &&
      (needs.build.result == 'success' || needs.build.result == 'skipped')
    steps:
      - name: Deploy on Remote Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /opt/my-app
            cd /opt/my-app

            cat > docker-compose.yml <<EOF
            services:
              app:
                image: ${{ secrets.DOCKER_USERNAME }}/my-app:latest
                ports:
                  - "8080:8080"
                restart: always
            EOF

            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
            docker compose pull
            docker compose up -d
            docker image prune -f